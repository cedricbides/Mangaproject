<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>MangaVerse</title>
    <meta name="description" content="Read manga online — thousands of titles, updated daily. Browse, track, and read for free on MangaVerse." />

    <!-- Open Graph — controls Discord, Facebook, Telegram previews -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://mangaverse.ink/" />
    <meta property="og:site_name"   content="MangaVerse" />
    <meta property="og:title"       content="MangaVerse — Read Manga Online" />
    <meta property="og:description" content="Read manga online — thousands of titles, updated daily. Browse, track, and read for free." />
    <meta property="og:image"       content="https://mangaverse.ink/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MangaVerse — Read Manga Online" />
    <meta name="twitter:description" content="Read manga online — thousands of titles, updated daily. Browse, track, and read for free." />
    <meta name="twitter:image"       content="https://mangaverse.ink/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # NOTE: /api, /auth, /uploads are NOT proxied here.
    # On Render, the frontend and backend are separate isolated containers —
    # the Docker-internal hostname (mangaverse-backend:5000) does not exist.
    # VITE_API_URL is baked into the JS bundle at build time so all API calls
    # go directly to the backend Render URL (no nginx proxy needed).
    # The proxy blocks below are only used in local Docker Compose.

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
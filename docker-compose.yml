version: '3.9'

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    container_name: mangaverse-backend
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    mem_limit: 350m
    memswap_limit: 350m
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      SESSION_SECRET: ${SESSION_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      SERVER_URL: ${SERVER_URL:-http://localhost:5000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/auth/google/callback}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    volumes:
      - uploads:/app/public/uploads

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    container_name: mangaverse-frontend
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  uploads: